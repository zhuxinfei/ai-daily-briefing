# 2026-04-27: 加大 journal 保留期, 让 briefing 故障排查能拿到完整运行日志.
#
# 起因: W17 周报漏 4 天日报根因调查时, journal 里 4/23-4/25 三次 daily run
# 的 stdout/stderr 已被默认轮转清掉, 只剩 4/26 一天日志. 若没靠代码逻辑
# 直接推出 promoteCommand 漏 mark published, 排查会卡很久.
#
# 容量 / 时间双兜底:
#   SystemMaxUse=500M     上限 500MB (当前 ~142M, 留 3-4 倍余量足够 21d)
#   MaxRetentionSec=21day 至少保留 3 周历史
#   Storage=persistent    显式持久化 (默认 auto 依赖 /var/log/journal 存在)
#
# 当磁盘空间紧张时, systemd 会优先用 SystemMaxUse 上限做 GC, 不会撑爆 /var.

[Journal]
Storage=persistent
SystemMaxUse=500M
MaxRetentionSec=21day
