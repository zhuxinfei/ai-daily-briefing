name: AI Daily Briefing

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STATE_BRANCH: automation-state
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.gjs.ink' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
      SLACK_TEST_WEBHOOK: ${{ secrets.SLACK_TEST_WEBHOOK || 'https://hooks.slack.com/services/disabled' }}
      SLACK_PROD_WEBHOOK: ${{ secrets.SLACK_PROD_WEBHOOK || 'https://hooks.slack.com/services/disabled' }}
      AI_DAILY_SITE_PUSH_TOKEN: ${{ secrets.AI_DAILY_SITE_PUSH_TOKEN }}
      BRIEFING_REPORT_URL_BASE: ${{ vars.BRIEFING_REPORT_URL_BASE || 'https://zhuxinfei.github.io/ai-daily-site/{{YEAR}}/{{YEARMONTH}}/{{DATE}}/' }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID || 'disabled' }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET || 'disabled' }}
      FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID || 'disabled' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: zhuxinfei/ai-daily-site
          ref: main
          path: site
          token: ${{ secrets.AI_DAILY_SITE_PUSH_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C site config user.name "github-actions[bot]"
          git -C site config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Restore state
        run: bash scripts/gha_restore_state.sh

      - name: Build
        run: go build -o ./bin/briefing ./cmd/briefing

      - name: Migrate & seed
        run: |
          ./bin/briefing migrate
          ./bin/briefing seed

      - name: Run pipeline
        env:
          HEXTRA_SITE_DIR: ${{ github.workspace }}/site
          PUBLISH_TARGET: test
          BRIEFING_MODE: prod
          BRIEFING_SKIP_IF_REPORT_EXISTS: '1'
        run: |
          RUN_DATE=$(TZ=Asia/Shanghai date +%F)
          ./bin/briefing run --date "$RUN_DATE" --domain ai --target test

      - name: Push
        working-directory: site
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: daily briefing $(TZ=Asia/Shanghai date +%F)"
          git push origin HEAD:main

      - name: Notify Feishu
        if: always()
        env:
          FEISHU_WEBHOOK: https://open.feishu.cn/open-apis/bot/v2/hook/b69fabf6-5922-4460-9055-c73322301316
        run: |
          RD=$(TZ=Asia/Shanghai date +%F)
          FILE="${{ github.workspace }}/site/content/cn/${RD:0:4}/${RD:0:7}/${RD}.md"
          if [ -f "$FILE" ]; then
            python3 scripts/feishu_notify.py "$FILE"
          else
            echo "No file to notify: $FILE"
          fi

      - name: Save state
        if: always()
        run: bash scripts/gha_save_state.sh
