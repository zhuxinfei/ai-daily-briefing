name: AI Daily Briefing

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
      AI_DAILY_SITE_PUSH_TOKEN: ${{ secrets.AI_DAILY_SITE_PUSH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Daily Briefing
        run: python3 scripts/gha_daily.py
