name: Cron Trigger

on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = Beijing 06:00
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CF Worker (retry x3)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3..."
            RESP=$(curl -s -w "\n%{http_code}" --max-time 60 \
              "https://daily-briefing.18368151865.workers.dev/run")
            HTTP=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | head -n -1)
            echo "  HTTP $HTTP — $BODY"
            if echo "$BODY" | grep -q "^ok_"; then
              echo "✅ Success"
              exit 0
            fi
            if [ $i -lt 3 ]; then
              echo "  Retrying in 60s..."
              sleep 60
            fi
          done
          echo "❌ All 3 attempts failed"
          exit 1
