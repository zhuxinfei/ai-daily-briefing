name: AI Weekly Briefing

on:
  schedule:
    # Sunday 22:00 Asia/Shanghai = Sunday 14:00 UTC.
    # At this point the Mon-Sun week is complete for the daily pipeline.
    - cron: '0 14 * * 0'
  workflow_dispatch:
    inputs:
      date:
        description: 'Anchor date in the ISO week to generate, YYYY-MM-DD. Empty = today in Asia/Shanghai.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ai-weekly-briefing
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.gjs.ink' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
      AI_DAILY_SITE_PUSH_TOKEN: ${{ secrets.AI_DAILY_SITE_PUSH_TOKEN }}
      SLACK_TEST_WEBHOOK: ${{ secrets.SLACK_TEST_WEBHOOK || 'https://hooks.slack.com/services/disabled' }}
      SLACK_PROD_WEBHOOK: ${{ secrets.SLACK_PROD_WEBHOOK || 'https://hooks.slack.com/services/disabled' }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID || 'disabled' }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET || 'disabled' }}
      FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID || 'disabled' }}
      BRIEFING_REPORT_URL_BASE: ${{ vars.BRIEFING_REPORT_URL_BASE || 'https://zhuxinfei.github.io/ai-daily-site/{{YEAR}}/{{YEARMONTH}}/{{DATE}}/' }}
      BRIEFING_MODE: prod
      BRIEFING_WEEKLY_NO_PUBLISH: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: zhuxinfei/ai-daily-site
          ref: main
          path: site
          token: ${{ secrets.AI_DAILY_SITE_PUSH_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C site config user.name "github-actions[bot]"
          git -C site config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Restore automation state
        run: bash scripts/gha_restore_state.sh

      - name: Run weekly pipeline
        env:
          RUN_DATE_INPUT: ${{ inputs.date }}
        run: |
          if [ -n "$RUN_DATE_INPUT" ]; then
            RUN_DATE="$RUN_DATE_INPUT"
          else
            RUN_DATE=$(TZ=Asia/Shanghai date +%F)
          fi
          echo "Weekly anchor date: $RUN_DATE"
          export HEXTRA_SITE_DIR="$GITHUB_WORKSPACE/site"
          go build -o ./bin/briefing ./cmd/briefing
          ./bin/briefing migrate
          ./bin/briefing seed
          ./bin/briefing weekly --date "$RUN_DATE" --domain ai --target test

      - name: Push weekly site update
        if: success()
        working-directory: site
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No weekly site changes"
            exit 0
          fi
          git commit -m "chore: weekly briefing $(TZ=Asia/Shanghai date +%G-W%V)"
          git push origin HEAD:main

      - name: Save automation state
        if: always()
        run: bash scripts/gha_save_state.sh
