name: AI Daily Briefing

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate Daily Briefing
        run: |
          echo "=== AI Daily Briefing $(TZ=Asia/Shanghai date) ==="
          
          API="https://api.gjs.ink/v1/chat/completions"
          KEY="${{ secrets.OPENAI_API_KEY }}"
          MODEL="gpt-5.4"
          GH_TOKEN="${{ secrets.AI_DAILY_SITE_PUSH_TOKEN }}"
          TODAY=$(TZ=Asia/Shanghai date +%F)
          TODAY_ZH=$(TZ=Asia/Shanghai date +%Y/%m/%d)
          
          # ---- 1. Fetch RSS headlines ----
          echo "[1/4] Fetching RSS feeds..."
          ARTICLES=""
          for feed in \
            "https://news.smol.ai/rss.xml" \
            "https://the-decoder.com/feed/" \
            "https://techcrunch.com/category/artificial-intelligence/feed/" \
            "https://openai.com/news/rss.xml" \
            "https://simonwillison.net/atom/everything/" \
            "https://huggingface.co/blog/feed.xml" \
            "https://rss.arxiv.org/rss/cs.AI"; do
            XML=$(curl -sL --max-time 10 -H "User-Agent: Mozilla/5.0" "$feed" 2>/dev/null || echo "")
            if [ -n "$XML" ]; then
              # Extract titles + links
              echo "$XML" | grep -oP '<item>.*?</item>' | head -5 | while read -r item; do
                title=$(echo "$item" | grep -oP '<title>\K[^<]+' | head -1 | sed 's/<!\[CDATA\[//;s/\]\]>//')
                link=$(echo "$item" | grep -oP '<link>\K[^<]+' | head -1)
                [ -n "$title" ] && ARTICLES="$ARTICLES
          $title | $link | $(echo "$feed" | cut -d/ -f3)"
              done 2>/dev/null
            fi
          done
          
          COUNT=$(echo "$ARTICLES" | grep -c "|" 2>/dev/null || echo 0)
          echo "  $COUNT articles"
          
          if [ "$COUNT" -lt 8 ]; then
            echo "  Too few articles, aborting"
            exit 0
          fi
          
          # ---- 2. Generate sections (LLM call 1) ----
          echo "[2/4] Generating sections..."
          SECTIONS_PROMPT="你是专业的AI日报编辑。根据以下AI新闻标题生成中文日报。
          格式: ### 🔵 产品与功能更新 / 🟢 前沿研究 / 🟡 行业展望 / 🟣 开源TOP / 🔴 社媒分享
          每条: \"1. **粗体标题**\n3-5句分析\n[锚文本](URL)\"
          专业名词加括号注释,每板块3-5条,严格来源于原材料。
          
          新闻标题: $ARTICLES"
          
          SECTIONS=$(curl -s --max-time 30 -X POST "$API" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $KEY" \
            -d "$(python3 -c "
          import json,sys
          print(json.dumps({'model':'$MODEL','messages':[
            {'role':'system','content':'你是专业的AI日报编辑。面向非技术读者,专业名词必须加括号注释。严格按格式输出。'},
            {'role':'user','content':sys.argv[1]}
          ],'temperature':0.3,'max_tokens':6000}))
          " "$SECTIONS_PROMPT")" | python3 -c "import sys,json; print(json.load(sys.stdin)['choices'][0]['message']['content'])" 2>/dev/null)
          
          if [ -z "$SECTIONS" ]; then
            echo "Section generation failed"; exit 1
          fi
          echo "  $(echo "$SECTIONS" | wc -c) chars"
          
          # ---- 3. Generate insight (LLM call 2) ----
          echo "[3/4] Generating insights..."
          INSIGHT=$(curl -s --max-time 30 -X POST "$API" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $KEY" \
            -d "$(python3 -c "
          import json,sys
          print(json.dumps({'model':'$MODEL','messages':[
            {'role':'system','content':'你是资深AI行业分析师。输出3-4条行业洞察,用\"1. 事实\n  【洞察】判断\"嵌套格式。至少2条整合多条新闻。专业名词加括号注释。'},
            {'role':'user','content':'以下为今日AI日报。请输出📊行业洞察(3-4条)和🗺️mermaid关系图。\n\n'+sys.argv[1]}
          ],'temperature':0.3,'max_tokens':3000}))
          " "$SECTIONS")" | python3 -c "import sys,json; print(json.load(sys.stdin)['choices'][0]['message']['content'])" 2>/dev/null)
          
          # ---- 4. Assemble and push ----
          echo "[4/4] Assembling and pushing..."
          SUMMARY=$(echo "$SECTIONS" | head -10 | curl -s --max-time 15 -X POST "$API" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $KEY" \
            -d "$(python3 -c "
          import json,sys
          print(json.dumps({'model':'$MODEL','messages':[
            {'role':'user','content':'用3句话概括以下AI日报要闻:\\n'+sys.argv[1]}
          ],'max_tokens':300}))
          " "$(echo "$SECTIONS" | head -c 3000)")" | python3 -c "import sys,json; print(json.load(sys.stdin)['choices'][0]['message']['content'])" 2>/dev/null)
          
          BODY="## **今日摘要**\n\n$SUMMARY\n\n$SECTIONS"
          [ -n "$INSIGHT" ] && BODY="$BODY\n\n---\n\n$INSIGHT"
          
          DESC=$(echo "$BODY" | head -c 120 | tr '\n' ' ' | sed 's/"/\\"/g')
          
          MARKDOWN="---
          linkTitle: \"$(echo $TODAY_ZH | cut -c6-) AI资讯\"
          title: \"AI资讯日报 $TODAY_ZH\"
          weight: $(TZ=Asia/Shanghai date +%d)
          breadcrumbs: false
          comments: false
          description: \"$DESC...\"
          ---
          
          > AI 早报 · 每日早读 · 全网深度聚合
          
          $BODY"
          
          FILE="content/cn/${TODAY:0:4}/${TODAY:0:7}/${TODAY}.md"
          
          # Check if exists
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/zhuxinfei/ai-daily-site/contents/$FILE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null)
          
          PAYLOAD=$(python3 -c "
          import json,base64,sys
          d={'message':'chore: daily briefing $TODAY','content':base64.b64encode(sys.argv[1].encode()).decode()}
          if '$SHA': d['sha']='$SHA'
          print(json.dumps(d))
          " "$MARKDOWN")
          
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/zhuxinfei/ai-daily-site/contents/$FILE" \
            -d "$PAYLOAD")
          
          echo "  Push: HTTP $HTTP"
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
            echo "✅ Published: https://zhuxinfei.github.io/ai-daily-site/"
          else
            echo "❌ Push failed"
            exit 1
          fi
