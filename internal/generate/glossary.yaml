# glossary.yaml — 注解白名单 + 需注解术语词表
#
# 用途：validator.go 的 ValidateInsight / ValidateCompose 用此词表判断
# 非技术读者（HR、运营、业务）可能不认识的专业术语是否加了括号注释。
#
# 判断标准："一个会用 ChatGPT 但不会写代码的老板是否认识"：
#   - 认识 → well_known（白名单，无需注解）
#   - 不认识 → jargon（必须在 ±30 字符内配括号注释）
#
# 维护原则：宁可多加 jargon 也不要漏；白名单只放真正耳熟能详的大公司/大概念。
# 新增术语时请配合更新 prompts.go 注解示例。

